[program:materialidad-frontend]
command=/usr/bin/env NODE_ENV=production PORT=3100 HOSTNAME=127.0.0.1 /usr/bin/node /srv/materialidad/frontend/.next/standalone/server.js
directory=/srv/materialidad/frontend
autostart=true
autorestart=true
user=www-data
stdout_logfile=/var/log/materialidad/frontend.out.log
stderr_logfile=/var/log/materialidad/frontend.err.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=3
startsecs=5
stopwaitsecs=10
stopsignal=TERM
stopasgroup=true
killasgroup=true
