upstream materialidad_backend {
    server unix:/run/materialidad/gunicorn.sock fail_timeout=0;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────
server {
    listen 80;
    server_name materialidad.online www.materialidad.online;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server ──────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name materialidad.online www.materialidad.online;

    ssl_certificate     /etc/letsencrypt/live/materialidad.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/materialidad.online/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 50m;

    # ── Security headers ──────────────────────────────────
    add_header X-Content-Type-Options  nosniff  always;
    add_header X-Frame-Options         DENY     always;
    add_header Referrer-Policy         strict-origin-when-cross-origin always;

    # ── Static / media files ──────────────────────────────
    location /static/ {
        alias /srv/materialidad/backend/staticfiles/;
        expires 30d;
        access_log off;
    }

    location /media/ {
        alias /srv/materialidad/backend/media/;
        expires 7d;
        access_log off;
    }

    # ── Django API ────────────────────────────────────────
    location /api/ {
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Tenant          $http_x_tenant;
        proxy_pass       http://materialidad_backend$request_uri;
        proxy_redirect   off;

        # Endpoints IA (generar/exportar/importar contratos) tardan 60-150 s
        proxy_connect_timeout 10s;
        proxy_send_timeout    180s;
        proxy_read_timeout    180s;
    }

    # ── SAT FastAPI ───────────────────────────────────────
    location /api/sat/ {
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass       http://127.0.0.1:8001/;
        proxy_redirect   off;
    }

    # ── Django admin ──────────────────────────────────────
    location /admin/ {
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass       http://materialidad_backend$request_uri;
        proxy_redirect   off;
    }

    # ── Favicon & manifest (avoid 404 in browser console) ─
    location = /favicon.ico {
        alias /srv/materialidad/frontend/public/favicon.ico;
        expires 30d;
        access_log off;
    }
    location = /manifest.json {
        alias /srv/materialidad/frontend/public/manifest.json;
        expires 1d;
        access_log off;
    }

    # ── Next.js static assets (long cache, direct) ──────
    location /_next/static/ {
        alias /srv/materialidad/frontend/.next/static/;
        expires 365d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # ── Next.js frontend (everything else) ────────────────
    location / {
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_pass       http://127.0.0.1:3100;
        proxy_redirect   off;
    }
}
